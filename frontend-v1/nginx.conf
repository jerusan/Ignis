server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API routes to backend — buffering off for SSE streaming
    location ~ ^/(chat|health|baseline-grid|specs) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Proxy manual page images to backend (not Vite build assets)
    location ~ ^/assets/.*\.(png|jpg|jpeg|webp)$ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
